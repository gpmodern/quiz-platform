<div class="login-container">
  <div class="login-box animate-slide-in">
    <div class="login-header">
      <h1>Quiz Platform</h1>
      <p>Sign In to Your Account</p>
    </div>

    <div *ngIf="error()" class="alert alert-danger alert-dismissible fade show animate-shake" role="alert">
      {{ error() }}
      <button type="button" class="btn-close" (click)="error.set(null)"></button>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [ngClass]="{ 'is-invalid': submitted() && f['email'].errors }"
        />
        <div class="invalid-feedback" *ngIf="submitted() && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [ngClass]="{ 'is-invalid': submitted() && f['password'].errors }"
        />
        <div class="invalid-feedback" *ngIf="submitted() && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-login w-100 mb-3"
        [disabled]="loading()"
      >
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()">
          <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          Signing in...
        </span>
      </button>
    </form>

    <div class="text-center">
      <p class="text-muted">Don't have an account? <a href="/register" class="text-decoration-none">Sign up here</a></p>
    </div>
  </div>
</div>
